<text x="92" y="733" font-size="11" fill="#444441">Realtime dashboard — Supabase websocket subscription, updates in &lt;5s end-to-end</text>

<rect x="75" y="744" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="92" y="754" font-size="11" fill="#444441">Full observability — sync_runs table tracks every execution, watermark, duration, errors</text>
