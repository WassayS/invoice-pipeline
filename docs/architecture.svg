<!-- Legend items -->
<rect x="75" y="597" width="10" height="10" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="92" y="607" font-size="11" fill="#444441">Webhook-driven — QuickBooks fires event → Render receives → pipeline triggers instantly</text>

<rect x="75" y="618" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="92" y="628" font-size="11" fill="#444441">Incremental sync via watermark — only changed records fetched, never full reload</text>

<rect x="75" y="639" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="92" y="649" font-size="11" fill="#444441">Exponential backoff with jitter + Retry-After header — production-grade API resilience</text>

<rect x="75" y="660" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="92" y="670" font-size="11" fill="#444441">UPSERT with idempotency — safe to run multiple times, no duplicates ever</text>

<rect x="75" y="681" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="92" y="691" font-size="11" fill="#444441">RLS on all 6 tables — service role for pipeline, anon key for dashboard, anon blocked</text>

<rect x="75" y="702" width="10" height="10" rx="2" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="92" y="712" font-size="11" fill="#444441">Immutable audit log — SHA-256 checksums, TRUNCATE revoked, triggers block mutation</text>

